<div class="contact-card">
  <p class="contact-line">For requests, comments, collaboration proposals, or questions, feel free to reach out.</p>

  <a class="email-action" [href]="'mailto:' + email">
    <fa-icon [icon]="emailIcon"></fa-icon>
    <span>{{ email }}</span>
  </a>

  <div class="contact-links">
    @for (link of links; track link.label) {
      <a class="contact-link" [href]="link.url" target="_blank" rel="noopener" [attr.aria-label]="link.label">
        <fa-icon [icon]="link.icon" size="lg"></fa-icon>
      </a>
    }
  </div>
</div>
