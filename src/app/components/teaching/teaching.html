<h1>Teaching & Materials</h1>

<table mat-table [dataSource]="courses" class="teaching-table mat-elevation-z1">

  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>Course / Material</th>
    <td mat-cell *matCellDef="let course">
      @if (course.url) {
        <a [href]="course.url" target="_blank" rel="noopener">{{ course.title }}</a>
      } @else {
        {{ course.title }}
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="institution">
    <th mat-header-cell *matHeaderCellDef>Institution</th>
    <td mat-cell *matCellDef="let course">{{ course.institution }}</td>
  </ng-container>

  <ng-container matColumnDef="year">
    <th mat-header-cell *matHeaderCellDef>Year</th>
    <td mat-cell *matCellDef="let course">{{ course.year }}</td>
  </ng-container>

  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef>Location</th>
    <td mat-cell *matCellDef="let course">{{ course.location }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
